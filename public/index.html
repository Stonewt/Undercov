<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undercover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-side topbar-left">
        <div id="topRoomInfo" class="top-meta hidden"></div>
      </div>

      <div class="brand-title">
        <h1>
          <span style="color:#60a5fa;font-weight:500;">Under</span>
          <span style="color:#f97316;font-weight:500;">cover</span>
        </h1>
      </div>

      <div class="topbar-side topbar-right">
        <div id="topHostInfo" class="top-meta hidden"></div>
      </div>

      <div id="statusBanner" class="status-banner hidden"></div>
    </div>

    <main class="page-center">

      <!-- MENU -->
      <div class="start-screen" id="startWrap">
        <div class="start-card" id="roomSetupCard">
          <div class="start-content start-content-full">
            <h2>Se connecter</h2>

            <div class="form-block hidden" id="resumeBlock">
              <button id="resumeBtn" class="big-btn">Reprendre</button>
            </div>

            <div class="separator hidden" id="resumeSeparator">ou</div>

            <div class="form-block">
              <label>Pseudo</label>
              <input id="nameInput" maxlength="20" />
            </div>

            <button id="createBtn" class="big-btn">Créer une room</button>

            <div class="separator">ou</div>

            <div class="join-row">
              <input id="roomInput" placeholder="Code" />
              <button id="joinBtn" class="big-btn">Rejoindre</button>
            </div>
          </div>
        </div>
      </div>

      <!-- GAME -->
      <div class="game-layout">

        <!-- LEFT -->
        <div class="panel panel-left">

          <div class="card hidden" id="secretCard">
            <h2>Ton mot</h2>
            <p id="wordText"></p>
          </div>

          <div class="card hidden" id="compositionCard">
            <h2>Configuration</h2>

            <label>Undercover</label>
            <input id="undercoverCountInput" type="number" value="1" />

            <label>Mr White</label>
            <input id="mrWhiteCountInput" type="number" value="0" />

            <label>Durée tour</label>
            <input id="turnDurationInput" type="number" value="30" />

            <label>Durée vote</label>
            <input id="voteDurationInput" type="number" value="30" />

            <label>Catégorie</label>
            <select id="categorySelect"></select>

            <label>Sous-catégorie</label>
            <select id="subcategorySelect"></select>

            <p id="compositionSummary"></p>
          </div>

          <div class="card hidden" id="voteCard">
            <h2>Vote</h2>
            <div id="voteButtons"></div>
            <p id="selectedVoteText"></p>
            <button id="confirmVoteBtn">Confirmer</button>
          </div>

          <div class="card hidden" id="resultCard">
            <h2>Résultat</h2>
            <p id="resultText"></p>
          </div>

          <button id="leaveBtn">Quitter</button>

        </div>

        <!-- CENTER -->
        <div class="panel panel-center">

          <div class="card hidden" id="lobby">

            <!-- TIMER -->
            <div class="timer-wrap">
              <div id="timerText">--</div>
              <div class="timer-bar">
                <div id="timerFill"></div>
              </div>
            </div>

            <!-- PLAYERS -->
            <ul id="playersList"></ul>

            <!-- CHAT -->
            <div class="chat-box hidden" id="chatCard">
              <div id="messagesList"></div>

              <input id="chatInput" />
              <button id="sendChatBtn">Envoyer</button>

              <p id="chatHelp"></p>
            </div>

            <!-- WAITING -->
            <div class="waiting-box hidden" id="waitingCard">
              <h2>Salon d'attente</h2>
              <p id="waitingText">En attente...</p>

              <!-- 👇 NOUVEAU -->
              <div class="role-dolls-wrap">
                <div class="role-dolls-title">Composition visuelle</div>
                <div id="waitingRoleDolls" class="role-dolls"></div>
              </div>

              <div class="waiting-meta">
                <div>
                  Catégorie : <span id="waitingCategory"></span>
                </div>
                <div>
                  Sous-cat : <span id="waitingSubcategory"></span>
                </div>
                <div>
                  Tour : <span id="waitingTurnDuration"></span>
                </div>
                <div>
                  Vote : <span id="waitingVoteDuration"></span>
                </div>
              </div>
            </div>

            <!-- END -->
            <div class="end-box hidden" id="endCard">
              <h2 id="endTitle"></h2>
              <p id="winnerText"></p>
              <ul id="revealList"></ul>
            </div>

            <!-- 👇 COMPOSITION CHAT -->
            <div class="role-dolls-wrap">
              <div class="role-dolls-title">Composition</div>
              <div id="roleDolls" class="role-dolls"></div>
            </div>

            <button id="startBtn">Lancer</button>
            <button id="restartBtn">Rejouer</button>

          </div>

        </div>

      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
