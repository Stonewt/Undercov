<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undercover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="topbar">
      <div></div>
      <h1>Undercover</h1>
      <div id="statusBanner" class="status-banner hidden"></div>
    </div>

    <aside class="ad-rail ad-rail-left" id="leftAds">
      <div class="ad-slot" data-ad="left-top">
        <button class="ad-close" data-close-ad="left-top">×</button>
      </div>
      <div class="ad-slot" data-ad="left-top">
        <button class="ad-close" data-close-ad="left-top">×</button>
      </div>
    </aside>

    <aside class="ad-rail ad-rail-right" id="rightAds">
      <div class="ad-slot" data-ad="left-top">
        <button class="ad-close" data-close-ad="left-top">×</button>
      </div>
      <div class="ad-slot" data-ad="left-top">
        <button class="ad-close" data-close-ad="left-top">×</button>
      </div>
    </aside>

    <main class="page-center">
      <div class="start-screen" id="startWrap">
        <div class="start-card" id="roomSetupCard">
          <h2>Se connecter à une salle</h2>
          <p class="start-subtitle">Crée une room ou rejoins-en une avec un code.</p>

          <div class="form-block">
            <label for="nameInput">Pseudo</label>
            <input id="nameInput" maxlength="20" placeholder="Ton pseudo" />
          </div>

          <div class="form-block">
            <button id="createBtn" class="big-btn">Créer une room</button>
          </div>

          <div class="separator">ou</div>

          <div class="join-row">
            <input id="roomInput" maxlength="6" placeholder="Code room" />
            <button id="joinBtn" class="big-btn">Rejoindre</button>
          </div>
        </div>
      </div>

      <div class="game-layout">
        <div class="panel panel-left">
          <div class="card hidden compact-card" id="secretCard">
            <h2>Ton mot</h2>
            <p id="wordText"></p>
          </div>

          <div class="card hidden compact-card" id="voteCard">
            <h2>Vote</h2>
            <div id="voteButtons"></div>
            <div class="vote-confirm-wrap">
              <p id="selectedVoteText">Aucun joueur sélectionné.</p>
              <button id="confirmVoteBtn" disabled>Confirmer mon vote</button>
            </div>
          </div>

          <div class="card hidden compact-card" id="resultCard">
            <h2>Résultat</h2>
            <p id="resultText"></p>
          </div>

          <div class="card hidden compact-card" id="endCard">
            <h2 id="endTitle">Fin de partie</h2>
            <p id="winnerText"></p>
            <ul id="revealList"></ul>
          </div>

          <div class="bottom-left-actions hidden" id="leaveWrap">
            <button id="leaveBtn" class="leave-btn">Quitter la partie</button>
          </div>
        </div>

        <div class="panel panel-center">
          <div class="card room-card hidden" id="lobby">
            <div class="room-header">
              <div>
                <h2>Room <span id="roomCode"></span></h2>
                <p id="hostInfo"></p>
                <p id="phaseInfo"></p>
                <p id="speakerInfo"></p>
              </div>
              <div class="room-actions">
                <button id="startBtn" class="hidden">Lancer</button>
                <button id="restartBtn" class="hidden">Rejouer</button>
              </div>
            </div>

            <div class="timer-wrap">
              <div class="timer-label">Temps restant</div>
              <div class="timer-bar">
                <div id="timerFill" class="timer-fill"></div>
              </div>
              <div id="timerText" class="timer-text">--</div>
            </div>

            <div class="room-content">
              <div class="players-box">
                <h3>Joueurs</h3>
                <ul id="playersList"></ul>
              </div>

              <div class="chat-box hidden" id="chatCard">
                <h3>Chat de la manche</h3>
                <div id="messagesList" class="messages"></div>
                <div class="row">
                  <input id="chatInput" maxlength="80" placeholder="Entre ton indice" />
                  <button id="sendChatBtn">Envoyer</button>
                </div>
                <p id="chatHelp"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
